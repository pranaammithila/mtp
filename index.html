<html lang="mai">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मैथिलीसमाचार शोधक टूल</title>
<style>
body {
font-family: Arial, sans-serif;
background: #f5f5f5;
padding: 10px;
margin: 0;
box-sizing: border-box;
}
 
.box {
background: #fff;
padding: 15px;
margin-bottom: 15px;
border-radius: 8px;
box-shadow: 0 1px 5px rgba(0,0,0,.1);
}
 
/* ग्रिड बॉक्स जो मोबाइलपर सिंगल कॉलमऔर डेस्कटॉप परडबल कॉलम होगा */
.grid-box {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 15px;
}
 
@media(max-width: 768px) {
.grid-box { 
grid-template-columns: 1fr; 
gap: 10px;
}
textarea {
height: 180px !important; /* मोबाइलपर बॉक्स कीहाइट कनी कमताकि स्क्रॉल नकरना पड़े */
}
}
 
textarea {
width: 100%;
height: 250px;
padding: 10px;
font-size: 18px;
border: 1px solid #ccc;
border-radius: 6px;
box-sizing: border-box;
resize: vertical;
}
 
input {
width: 100%;
padding: 12px;
margin-bottom: 10px;
border: 1px solid #ccc;
border-radius: 6px;
box-sizing: border-box;
font-size: 16px;
}
 
/* बटन ग्रुप जो मोबाइलपर ऑटो-रैपऔर टच-फ्रेंडलीहोगा */
.btn-group {
display: flex;
flex-wrap: wrap;
gap: 8px;
}
 
button {
padding: 12px 18px;
flex: 1 1 auto; /* मोबाइलपर बटन स्पेसके हिसाब सेखुद को एडजस्टकरेंगे */
min-width: 80px;
cursor: pointer;
border: none;
border-radius: 6px;
background: #0073aa;
color: #fff;
font-size: 16px;
font-weight: bold;
text-align: center;
touch-action: manipulation; /* मोबाइल टचरिस्पॉन्स को फ़ास्टकरने के लिए */
}
 
button:hover {
background: #005f8d;
}
 
#savedNewsList div {
padding: 10px;
border-bottom: 1px solid #ddd;
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 5px;
}
 
#countBox {
margin-top: 10px;
font-weight: bold;
font-size: 14px;
}
 
.live-counter {
font-size: 14px;
color: #555;
margin-top: 5px;
font-weight: bold;
}
 
/* फोटो और फाइंड-रिप्लेस सेक्शन कोमोबाइल फ्रेंडली बनाना */
.photo-flex, .find-replace-flex {
display: flex;
flex-direction: column;
gap: 10px;
}
 
@media(min-width: 600px) {
.photo-flex, .find-replace-flex {
flex-direction: row;
align-items: center;
}
.photo-flex input, .find-replace-flex input {
width: auto;
flex: 1;
margin-bottom: 0;
}
}
 
.photo-flex input[type="file"] {
display: none;
}
 
.image-preview-box {
margin-top: 15px;
width: 100%;
max-width: 300px;
height: auto;
display: none;
border: 1px solid #ddd;
border-radius: 6px;
}
 
.upload-btn { background: #2271b1; }
.download-btn { background: #46b450; }
.download-btn:hover { background: #34963b; }
.clear-img-btn { background: #dc3232; }
.clear-img-btn:hover { background: #a82424; }
.output-find-btn { background: #e14d43; }
.output-find-btn:hover { background: #b53e36; }
.clean-btn { background: #f0b84c; color: #000; }
.clean-btn:hover { background: #dca334; }
</style>

<div class="box btn-group">
<button id="correctBtn">सुधारू</button>

<img id="imagePreview" class="image-preview-box" alt="Preview">

<div class="box">

<div id="ruleList"></div>
<hr>
<h3>Saved News</h3>
<div id="savedNewsList"></div>

const inputNews=document.getElementById("inputNews");
const outputNews=document.getElementById("outputNews");
 
function replaceWholeWord(text, find, replace) {
    // देवनागरी आ अंग्रेजी दुनू लेल एकदम सटीक वर्ड बाउंड्री (Word Boundary) लॉजिक
    const escaped = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp('(^|[^\\u0900-\\u097Fa-zA-Z0-9])(' + escaped + ')(?=[^\\u0900-\\u097Fa-zA-Z0-9]|$)', 'g');
    return text.replace(regex, (match, p1, p2) => p1 + replace);
}

function processNews(){
    let text = inputNews.value;
     
    // १. सिर्फ डबल स्टार (**) कए हटाबय लेल, SINGLE स्टार (*) सुरक्षित रहत
    text = text.replace(/\*\*(.*?)\*\*/g, '$1');
     
    // २. सटल शब्दसभ कए अलगे क कए स्पेस देनाई (सिर्फ शब्दक अंत मे - रामेश्वर सुरक्षित रहत)
    text = text.replace(/([\u0900-\u097F]+)(मे|में)(?=\s|$)/g, '$1 मे');
    text = text.replace(/([\u0900-\u097F]+)(कें|केँ)(?=\s|$)/g, '$1 कें');
    text = text.replace(/([\u0900-\u097F]+)(सं|सँ)(?=\s|$)/g, '$1 सं');
    text = text.replace(/([\u0900-\u097F]+)सभ(?!ा)(?=\s|$)/g, '$1 सभ');
     
    // ३. विशिष्ट शब्दक बदलाव (धर्मेंद्र, मेंढक कए सुरक्षित रखैत)
    text = text.replace(/\bमें\b/g, 'मे');
    text = text.replace(/\bदोनों\b/g, 'दूनू');
    text = text.replace(/सुबह/g, 'भोर');
    text = text.replace(/गुरुवार/g, 'बृहस्पति');
    text = text.replace(/NHAI/g, 'एनएचएआई');
    text = text.replace(/लयकऽ/g, 'लए कए');
     
    // ४. 'को' कए स्वतंत्र रूप सँ हटाबय लेल
    text = text.replace(/\bको\b/g, '');
     
    // ५. चंद्रबिंदु (ँ) हटाबय लेल
    text = text.replace(/ँ/g, '');
     
    // ६. नियम आधारित सामान्य रिप्लेसमेंट (अब ई अपग्रेड भ गेल अछि, मामला -> मामिला सही काम करत)
    rules.forEach(rule => {
        text = replaceWholeWord(text, rule[0], rule[1]);
    });
     
    // ७. 'क' कए पहिलुका शब्द सँ जोड़ब
    text = text.replace(/\s+क(?=\s|$)/g, 'क');
     
    // ८. अंग्रेजी अंक मे बदलाव
    const numMap = {'०':'0','१':'1','२':'2','३':'3','४':'4','५':'5','६':'6','७':'7','८':'8','९':'9'};
    text = text.replace(/[०-९]/g, m => numMap[m]);
     
    // ९. अंकक बाद 'म' क नियम (जैसे: 47 म -> 47म)
    text = text.replace(/(\d+)\s*(वां|वें|वी|वा|म)(?=\s|$)/g, '$1म');
     
    // १०. बाकी व्याकरणिक अनुस्वार नियम
    text = text.replace(/म्([पफबभ])/g, 'ं$1'); 
    text = text.replace(/न्([तथदध])/g, 'ं$1'); 
    text = text.replace(/ण्([टठडढण])/g, 'ं$1');
     
    // एक्स्ट्रा डबल स्पेस हटा कए ट्रिम करब
    outputNews.value = text.replace(/ {2,}/g, ' ').trim();
    updateStats();

text = text.replace(/[०-९]/g, m => numMap[m]);
 
// ९. अंकक बाद 'म' क नियम (जैसे: 47 म -> 47म)
text = text.replace(/(\d+)\s*(वां|वें|वी|वा|म)(?=\s|$)/g, '$1म');
 
// १०. बाकी व्याकरणिक अनुस्वार नियम
text = text.replace(/म्([पफबभ])/g, 'ं$1'); 
text = text.replace(/न्([तथदध])/g, 'ं$1'); 
text = text.replace(/ण्([टठडढण])/g, 'ं$1');
 
// एक्स्ट्रा डबल स्पेस हटा कए ट्रिम करब
outputNews.value = text.replace(/ {2,}/g, ' ').trim();
updateStats();
} 
function updateStats() {
    let inText = inputNews.value.trim();
    let inWords = inText === "" ? 0 : inText.split(/\s+/).length;
    let inChars = inText.length;
   document.getElementById("inputStats").innerText = `शब्द: ${inWords} | अक्षर: ${inChars}`;
 
    let outText = outputNews.value.trim();
    let outWords = outText === "" ? 0 : outText.split(/\s+/).length;
    let outChars = outText.length;
   document.getElementById("outputStats").innerText = `शब्द: ${outWords} | अक्षर: ${outChars}`;
}

function saveNews(){
let news=outputNews.value.trim();
if(news===""){ alert("पहिने समाचार सुधारू"); return; }
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
if(savedNews.includes(news)){ alert("ई समाचार पहिने सं सेव अछि"); return; }
savedNews.unshift(news);
localStorage.setItem("savedNews",JSON.stringify(savedNews));
loadSavedNews();
}
 
document.getElementById("saveBtn").addEventListener("click",saveNews);
 
function loadSavedNews(){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
let html="";
savedNews.forEach((news,index)=>{
html+=`<div><b>News ${index+1}</b><div><button onclick="openNews(${index})">Open</button> <button onclick="deleteSavedNews(${index})">Delete</button></div></div>`;
});
document.getElementById("savedNewsList").innerHTML=html;
updateCounts();
}
 
function openNews(index){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
outputNews.value=savedNews[index];
updateStats();
}
 
function deleteSavedNews(index){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
savedNews.splice(index,1);
localStorage.setItem("savedNews",JSON.stringify(savedNews));
loadSavedNews();
}

});

let loadedImage = null;
const imageInput = document.getElementById("imageInput");
const imagePreview = document.getElementById("imagePreview");
const photoNameInput = document.getElementById("photoName");
 
imageInput.addEventListener("change", function(e) {
    if(e.target.files && e.target.files[0]) {
        loadImage(e.target.files[0]);
    }
});
 
window.addEventListener("paste", function(e) {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
            const blob = items[i].getAsFile();
            loadImage(blob);
        }
    }
});
 
function loadImage(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            loadedImage = img;
            imagePreview.src = event.target.result;
            imagePreview.style.display = "block";
        };
        img.src = event.target.result;
    };
   reader.readAsDataURL(file);
}
 
document.getElementById("downloadImgBtn").addEventListener("click", function() {
    if (!loadedImage) {
        alert("पहिने कोनो फोटो अपलोड या पेस्ट करू");
        return;
    }
    
    let filename = photoNameInput.value.trim();
    if (!filename) {
        filename = "image_101";
    }
 
    const canvas = document.createElement("canvas");
    canvas.width = loadedImage.naturalWidth;
    canvas.height = loadedImage.naturalHeight;
    const ctx = canvas.getContext("2d");
    
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
   ctx.drawImage(loadedImage, 0, 0);
 
    const dataUrl = canvas.toDataURL("image/jpeg", 1.0);
    
    const link = document.createElement("a");
    link.download = filename + ".jpg";
    link.href = dataUrl;
    link.click();
 
    const match = filename.match(/(\d+)$/);
    if (match) {
        const nextNum = parseInt(match[1], 10) + 1;
        const paddedNum = String(nextNum).padStart(match[1].length, '0');
       photoNameInput.value = filename.replace(/\d+$/, paddedNum);
    }
});
 
document.getElementById("clearImgBtn").addEventListener("click", function() {
    loadedImage = null;
    imageInput.value = "";
    imagePreview.src = "";
   imagePreview.style.display = "none";
});
