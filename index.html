<html lang="mai">
<head>
<meta charset="UTF-8">
<title>मैथिली समाचार शोधक टूल</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:15px;
}

.box{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 1px 5px rgba(0,0,0,.1);
}

.grid-box {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 15px;
}

@media(max-width: 768px) {
.grid-box { grid-template-columns: 1fr; }
}

textarea{
width:100%;
height:250px;
padding:10px;
font-size:18px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:10px 15px;
margin:3px;
cursor:pointer;
border:none;
border-radius:5px;
background:#0073aa;
color:#fff;
}

button:hover{
background:#005f8d;
}

#savedNewsList div{
padding:8px;
border-bottom:1px solid #ddd;
}

#countBox{
margin-top:10px;
font-weight:bold;
}

.live-counter {
font-size: 14px;
color: #555;
margin-top: 5px;
font-weight: bold;
}
</style>
</head>
<body>

<div class="box">
<input id="oldWord" type="text" placeholder="पुरान शब्द">
<input id="newWord" type="text" placeholder="नव शब्द">
<button id="addRuleBtn">Add Rule</button>
</div>

<div class="grid-box">
    <div class="box">
        <textarea id="inputNews" placeholder="एतय समाचार पेस्ट करू"></textarea>
        <div id="inputStats" class="live-counter">शब्द: 0 | अक्षर: 0</div>
    </div>
    <div class="box">
        <textarea id="outputNews" placeholder="सुधारल समाचार एतय आएत"></textarea>
        <div id="outputStats" class="live-counter">शब्द: 0 | अक्षर: 0</div>
    </div>
</div>

<div class="box">
<button id="correctBtn">सुधारू</button>
<button id="copyBtn">Copy</button>
<button id="saveBtn">Save</button>
<button id="clearBtn">Clear</button>
</div>

<div class="box">
<h3>Custom Rules</h3>
<div id="ruleList"></div>
<hr>
<h3>Saved News</h3>
<div id="savedNewsList"></div>
<div id="countBox"></div>
</div>

const inputNews=document.getElementById("inputNews");
const outputNews=document.getElementById("outputNews");

function replaceWholeWord(text,find,replace){
const escaped=find.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
return text.replace(
new RegExp('(^|[^\\u0900-\\u097Fa-zA-Z0-9])'+escaped+'(?=[^\\u0900-\\u097Fa-zA-Z0-9]|$)','g'),
m=>m.replace(find,replace)
);
}

function processNews(){
let text=inputNews.value;

// १. सबसं पहिने 'सभ', 'कें', 'मे', 'सं', 'सँ' कए सटल रहला पर स्पेस दऽ कए अलग करब
// (एकर ऑर्डर सबसं पहिने कऽ देल गेल अछि ताकि कोनो कन्फ्यूजन नहि रहय)
text = text.replace(/([\u0900-\u097F]+)सभ/g, '$1 सभ');
text = text.replace(/([\u0900-\u097F]+)कें/g, '$1 कें');
text = text.replace(/([\u0900-\u097F]+)केँ/g, '$1 कें');
text = text.replace(/([\u0900-\u097F]+)मे/g, '$1 मे');
text = text.replace(/([\u0900-\u097F]+)में/g, '$1 मे');
text = text.replace(/([\u0900-\u097F]+)सं/g, '$1 सं');
text = text.replace(/([\u0900-\u097F]+)सँ/g, '$1 सं');

// २. सभ शब्दक सामान्य नियम (रूल्स एर्रे) कए रिप्लेस करब
rules.forEach(rule=>{
text=replaceWholeWord(text,rule[0],rule[1]);
});

// ३. देवनागरी अंक कए ऑटोमैटिक अंग्रेजी अंक में बदलब
const numMap = {'०':'0','१':'1','२':'2','३':'3','४':'4','५':'5','६':'6','७':'7','८':'8','९':'9'};
text = text.replace(/[०-९]/g, m => numMap[m]);

// ४. रैंकिंग/पोजीशन कए मैथिली स्टाइल में बदलब (जैसे: 47वां -> 47म)
text = text.replace(/(\d+)\s*(वां|वें|वी|वा)/g, '$1म');

// ५. ऑटोमैटिक अनुस्वार नियम (केन्द्र -> केंद्र, सम्भव -> संभव)
text = text.replace(/म्([पफबभम])/g, 'ं$1');
text = text.replace(/न्([तथदधन])/g, 'ं$1');
text = text.replace(/ण्([टठडढण])/g, 'ं$1');

// ६. चंद्रबिंदु हटा कए अनुस्वार करब
text = text.replace(/ँ/g, "ं");

outputNews.value=text;
updateStats();
}

function updateStats() {
    let inText = inputNews.value.trim();
    let inWords = inText === "" ? 0 : inText.split(/\s+/).length;
    let inChars = inText.length;
    document.getElementById("inputStats").innerText = `शब्द: ${inWords} | अक्षर: ${inChars}`;

    let outText = outputNews.value.trim();
    let outWords = outText === "" ? 0 : outText.split(/\s+/).length;
    let outChars = outText.length;
    document.getElementById("outputStats").innerText = `शब्द: ${outWords} | अक्षर: ${outChars}`;
}

inputNews.addEventListener("input", updateStats);
outputNews.addEventListener("input", updateStats);

document.getElementById("correctBtn").addEventListener("click",processNews);

document.getElementById("copyBtn")
.addEventListener("click",()=>{
navigator.clipboard.writeText(outputNews.value);
alert("Copied");
});

function saveNews(){
let news=outputNews.value.trim();
if(news===""){ alert("पहिने समाचार सुधारू"); return; }
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
if(savedNews.includes(news)){ alert("ई समाचार पहिनेसं सेव अछि"); return; }
savedNews.unshift(news);
localStorage.setItem("savedNews",JSON.stringify(savedNews));
loadSavedNews();
}

document.getElementById("saveBtn").addEventListener("click",saveNews);

function loadSavedNews(){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
let html="";
savedNews.forEach((news,index)=>{
html+=`<div><b>News ${index+1}</b> <button onclick="openNews(${index})">Open</button> <button onclick="deleteSavedNews(${index})">Delete</button></div>`;
});
document.getElementById("savedNewsList").innerHTML=html;
updateCounts();
}

function openNews(index){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
outputNews.value=savedNews[index];
updateStats();
}

function deleteSavedNews(index){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
savedNews.splice(index,1);
localStorage.setItem("savedNews",JSON.stringify(savedNews));
loadSavedNews();
}

document.getElementById("clearBtn")
.addEventListener("click",()=>{
inputNews.value="";
outputNews.value="";
updateStats();
});

let customRules=JSON.parse(localStorage.getItem("customRules")||"[]");
customRules.forEach(rule=>{ rules.push(rule); });

document.getElementById("addRuleBtn")
.addEventListener("click",()=>{
let oldWord=document.getElementById("oldWord").value.trim();
let newWord=document.getElementById("newWord").value.trim();
if(!oldWord||!newWord){ alert("दुनू शब्द भरू"); return; }
rules.push([oldWord,newWord]);
customRules.push([oldWord,newWord]);
localStorage.setItem("customRules",JSON.stringify(customRules));
showRules();
document.getElementById("oldWord").value="";
document.getElementById("newWord").value="";
});

function showRules(){
let html="";
customRules.forEach((rule,index)=>{
html+=`<div>${rule[0]} ➜ ${rule[1]} <button onclick="deleteRule(${index})">Delete</button></div>`;
});
document.getElementById("ruleList").innerHTML=html;
}

function deleteRule(index){
customRules.splice(index,1);
localStorage.setItem("customRules",JSON.stringify(customRules));
location.reload();
}

function updateCounts(){
let savedNews=JSON.parse(localStorage.getItem("savedNews")||"[]");
document.getElementById("countBox").innerHTML="Rules : "+customRules.length+" | Saved News : "+savedNews.length;
}

setInterval(()=>{
localStorage.setItem("draftNews",inputNews.value);
},5000);

window.addEventListener("load",()=>{
let draft=localStorage.getItem("draftNews");
if(draft){ inputNews.value=draft; }
showRules();
loadSavedNews();
updateStats();
});
</script>
