<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News Correction & Photo Manager</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:15px;
}

.box{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 1px 5px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:250px;
padding:10px;
font-size:18px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:10px 15px;
margin:3px;
cursor:pointer;
border:none;
border-radius:5px;
background:#0073aa;
color:#fff;
}

button:hover{
background:#005f8d;
}

img{
max-width:100%;
border:1px solid #ccc;
display:none;
margin-top:10px;
}

#countBox{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<input id="oldWord" placeholder="पुरान शब्द">
<input id="newWord" placeholder="नव शब्द">
<button id="addRuleBtn">Add Rule</button>
</div>

<div class="box">
<textarea id="inputNews" placeholder="समाचार पेस्ट करू"></textarea>
</div>

<div class="box">
<button id="correctBtn">सुधारू</button>
<button id="copyBtn">Copy</button>
<button id="saveBtn">Save</button>
<button id="clearBtn">Clear</button>
</div>

<div class="box">
<textarea id="outputNews" placeholder="सुधारल समाचार"></textarea>
</div>

<div class="box">
<h3>Custom Rules</h3>
<div id="ruleList"></div>

<hr>

<h3>Saved News</h3>
<div id="savedNewsList"></div>

<div id="countBox"></div>
</div>

<div class="box">
<h3>Photo JPG Manager HD</h3>

<input type="number" id="photoNumber" placeholder="Photo Number">

<input type="file" id="photoInput" accept="image/*">

<button onclick="downloadJPG()">Download JPG</button>

<img id="previewImg">
</div>

<script>

const rules=[
["सँ","सं"],
["केँ","कें"],
["में","मे"],
["पानी","पानि"],
["कहा","कहलनि"],
["बताया","बतौलनि"],
["जबकि","जखनकि"],
["आज","आइ"],
["सुबह","भोर"],
["केवल","मात्र"],
["दूसरा","दोसर"],
["तीसरा","तेसर"],
["चौथा","चारिम"],
["पांचवां","पांचम"],
["अब तक","एखन धरि"],
["बड़ा","पैघ"],
["नजर","नजरि"],
["आग","आगि"],
["मरीज","रोगी"],
["राहत","राहति"],
["बार-बार","बेर-बेर"],
["मिलल","भेटल"],
["वाला","बला"],
["सबसे","सबसं"]
];

const inputNews=document.getElementById("inputNews");
const outputNews=document.getElementById("outputNews");

function replaceWholeWord(text,find,replace){

const escaped=find.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

return text.replace(
new RegExp(
'(^|[^\\u0900-\\u097F])'+escaped+
'(?=[^\\u0900-\\u097F]|$)','g'
),
m=>m.replace(find,replace)
);

}

function processNews(){

let text=inputNews.value;

rules.forEach(rule=>{
text=replaceWholeWord(text,rule[0],rule[1]);
});

text=text.replace(/ँ/g,"ं");

outputNews.value=text;

}

document.getElementById("correctBtn")
.addEventListener("click",processNews);

document.getElementById("copyBtn")
.addEventListener("click",()=>{

navigator.clipboard.writeText(
outputNews.value
);

alert("Copied");

});

document.getElementById("clearBtn")
.addEventListener("click",()=>{

inputNews.value="";
outputNews.value="";

});

function saveNews(){

let news=outputNews.value.trim();

if(!news)return;

let saved=
JSON.parse(
localStorage.getItem("savedNews")||"[]"
);

saved.unshift(news);

localStorage.setItem(
"savedNews",
JSON.stringify(saved)
);

loadSavedNews();

}

document.getElementById("saveBtn")
.addEventListener("click",saveNews);

function loadSavedNews(){

let saved=
JSON.parse(
localStorage.getItem("savedNews")||"[]"
);

let html="";

saved.forEach((n,i)=>{

html+=`
<div>
News ${i+1}
<button onclick="openNews(${i})">
Open
</button>
<button onclick="deleteNews(${i})">
Delete
</button>
</div>
`;

});

document.getElementById("savedNewsList")
.innerHTML=html;

document.getElementById("countBox")
.innerHTML=
"Saved News : "+saved.length;

}

function openNews(i){

let saved=
JSON.parse(
localStorage.getItem("savedNews")||"[]"
);

outputNews.value=saved[i];

}

function deleteNews(i){

let saved=
JSON.parse(
localStorage.getItem("savedNews")||"[]"
);

saved.splice(i,1);

localStorage.setItem(
"savedNews",
JSON.stringify(saved)
);

loadSavedNews();

}

let customRules=
JSON.parse(
localStorage.getItem("customRules")||"[]"
);

customRules.forEach(r=>rules.push(r));

function showRules(){

let html="";

customRules.forEach((r,i)=>{

html+=`
<div>
${r[0]} ➜ ${r[1]}
<button onclick="deleteRule(${i})">
Delete
</button>
</div>
`;

});

document.getElementById("ruleList")
.innerHTML=html;

}

document.getElementById("addRuleBtn")
.addEventListener("click",()=>{

let oldWord=
document.getElementById("oldWord").value.trim();

let newWord=
document.getElementById("newWord").value.trim();

if(!oldWord||!newWord)return;

customRules.push([oldWord,newWord]);
rules.push([oldWord,newWord]);

localStorage.setItem(
"customRules",
JSON.stringify(customRules)
);

showRules();

});

function deleteRule(i){

customRules.splice(i,1);

localStorage.setItem(
"customRules",
JSON.stringify(customRules)
);

location.reload();

}

/* PHOTO SECTION */

let currentImageData="";
let autoPhotoNo=parseInt(
localStorage.getItem("autoPhotoNo")||"1"
);

document.getElementById("photoNumber")
.value=autoPhotoNo;

document.getElementById("photoInput")
.addEventListener("change",function(){

const file=this.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(e){

currentImageData=e.target.result;

document.getElementById("previewImg")
.src=currentImageData;

document.getElementById("previewImg")
.style.display="block";

};

reader.readAsDataURL(file);

});

document.addEventListener("paste",function(e){

const items=e.clipboardData.items;

for(let item of items){

if(item.type.indexOf("image")!==-1){

const file=item.getAsFile();

const reader=new FileReader();

reader.onload=function(ev){

currentImageData=ev.target.result;

document.getElementById("previewImg")
.src=currentImageData;

document.getElementById("previewImg")
.style.display="block";

};

reader.readAsDataURL(file);

}

}

});

function downloadJPG(){

if(!currentImageData){
alert("पहिने फोटो चुनू");
return;
}

const img=new Image();

img.onload=function(){

const canvas=
document.createElement("canvas");

canvas.width=img.width;
canvas.height=img.height;

canvas.getContext("2d")
.drawImage(img,0,0);

let num=
document.getElementById("photoNumber")
.value;

canvas.toBlob(function(blob){

const a=
document.createElement("a");

a.href=
URL.createObjectURL(blob);

a.download=num+".jpg";

a.click();

autoPhotoNo=parseInt(num)+1;

localStorage.setItem(
"autoPhotoNo",
autoPhotoNo
);

document.getElementById("photoNumber")
.value=autoPhotoNo;

},"image/jpeg",1);

};

img.src=currentImageData;

}

setInterval(()=>{

localStorage.setItem(
"draftNews",
inputNews.value
);

},5000);

window.onload=function(){

let draft=
localStorage.getItem("draftNews");

if(draft){
inputNews.value=draft;
}

showRules();
loadSavedNews();

};

</script>

</body>
</html>
