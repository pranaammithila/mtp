<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maithili News Correction Editor</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
textarea,input{width:100%;padding:10px;box-sizing:border-box;margin:5px 0}
textarea{height:220px}
button{padding:10px 14px;margin:4px;border:none;border-radius:6px;cursor:pointer}
#outputNews{height:260px}
</style>
</head>
<body>
<div class="card">
<h2>Maithili News Correction Editor</h2>
<input id="oldWord" placeholder="पुरान शब्द">
<input id="newWord" placeholder="नव शब्द">
<button onclick="addRule()">Add Rule</button>
</div>

<div class="card">
<textarea id="inputNews" placeholder="समाचार पेस्ट करू"></textarea>
</div>

<div class="card">
<button onclick="processNews()">सुधारू</button>
<button onclick="copyNews()">Copy</button>
<button onclick="saveNews()">Save</button>
<button onclick="clearNews()">Clear</button>
</div>

<div class="card">
<textarea id="outputNews" placeholder="सुधारल समाचार"></textarea>
</div>

<script>
let rules=[
["पानी","पानि"],["आज","आइ"],["जबकि","जखनकि"],
["केवल","मात्र"],["मरीज","रोगी"],["राहत","राहति"],
["तालाब","पोखरि"],["बार-बार","बेर-बेर"],["आग","आगि"],
["दूसरा","दोसर"],["तीसरा","तेसर"],["चौथा","चारिम"],
["पांचवां","पांचम"],["अब तक","एखन धरि"],["सुबह","भोर"],
["नजर","नजरि"],["वाला","बला"],["सबसे","सबसं"]
];

function processNews(){
 let t=document.getElementById('inputNews').value;
 rules.forEach(r=>t=t.split(r[0]).join(r[1]));
 t=t.replace(/ँ/g,'ं');
 document.getElementById('outputNews').value=t;
}
function copyNews(){
 navigator.clipboard.writeText(document.getElementById('outputNews').value);
 alert('Copied');
}
function clearNews(){
 inputNews.value=''; outputNews.value='';
}
function saveNews(){
 localStorage.setItem('savedNews',outputNews.value);
 alert('Saved');
}
function addRule(){
 let o=oldWord.value,n=newWord.value;
 if(o&&n){rules.push([o,n]); alert('Rule Added');}
}
</script>
</body>
</html>
